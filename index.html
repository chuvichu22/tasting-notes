<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>테이스팅 노트</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">
  <div class="max-w-2xl mx-auto p-6">
    <h1 class="text-4xl font-bold text-center mb-8 flex items-center justify-center gap-3">
      🍳 테이스팅 노트
    </h1>

    <button onclick="openNewDish()" 
            class="bg-orange-600 text-white px-8 py-4 rounded-2xl text-lg font-medium mb-8 w-full">
      ➕ 새 요리 만들기
    </button>

    <div id="dishList" class="space-y-4"></div>
  </div>

  <!-- 모달 -->
  <div id="modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50 p-4">
    <div class="bg-white rounded-3xl w-full max-w-lg max-h-[90vh] overflow-auto">
      <div class="p-6 border-b">
        <h2 class="text-2xl font-bold">요리 기록</h2>
      </div>
      
      <div class="p-6 space-y-6">
        <input id="dishName" type="text" placeholder="요리 이름 *" class="w-full p-4 border rounded-2xl text-lg">

        <textarea id="recipe" placeholder="레시피" class="w-full p-4 border rounded-2xl h-32"></textarea>

        <div>
          <input type="file" id="photoInput" multiple accept="image/*" class="hidden" onchange="addPhotos(event)">
          <button onclick="document.getElementById('photoInput').click()" 
                  class="w-full border-2 border-dashed border-gray-300 p-12 rounded-2xl hover:border-orange-500">
            📷 사진 추가 (여러장 OK)
          </button>
        </div>

        <div id="photoPreview" class="grid grid-cols-3 gap-3"></div>

        <textarea id="comment" placeholder="테이스팅 후기" class="w-full p-4 border rounded-2xl h-32"></textarea>
      </div>

      <div class="p-6 border-t flex gap-4">
        <button onclick="closeModal()" class="flex-1 py-4 border rounded-2xl">취소</button>
        <button onclick="saveDish()" class="flex-1 py-4 bg-orange-600 text-white rounded-2xl">저장하기</button>
      </div>
    </div>
  </div>

  <script>
    let dishes = [];
    let currentDish = null;
    let photos = [];

    function loadDishes() {
      dishes = JSON.parse(localStorage.getItem('dishes') || '[]');
      renderDishList();
    }

    function renderDishList() {
      const container = document.getElementById('dishList');
      container.innerHTML = dishes.length === 0 ? 
        '<p class="text-center text-gray-500 py-12">아직 등록된 요리가 없습니다.</p>' : 
        dishes.map(d => `
          <div onclick="editDish('${d.id}')" class="bg-white p-5 rounded-2xl shadow-sm cursor-pointer hover:shadow">
            <div class="flex gap-4">
              ${d.photos && d.photos.length ? `<img src="${d.photos[0]}" class="w-16 h-16 object-cover rounded-xl">` : ''}
              <div>
                <h3 class="font-semibold text-lg">${d.dishName}</h3>
                <p class="text-sm text-gray-500">${new Date(d.date).toLocaleDateString('ko-KR')}</p>
              </div>
            </div>
          </div>
        `).join('');
    }

    function openNewDish() {
      currentDish = { id: Date.now().toString(), date: new Date().toISOString(), photos: [] };
      photos = [];
      document.getElementById('modal').classList.remove('hidden');
      document.getElementById('dishName').value = '';
      document.getElementById('recipe').value = '';
      document.getElementById('comment').value = '';
      document.getElementById('photoPreview').innerHTML = '';
    }

    function closeModal() {
      document.getElementById('modal').classList.add('hidden');
    }

    async function addPhotos(e) {
      const files = e.target.files;
      for (let file of files) {
        const base64 = await compressImage(file);
        photos.push(base64);
        renderPreview();
      }
    }

    function compressImage(file) {
      return new Promise(resolve => {
        const reader = new FileReader();
        reader.onload = e => {
          const img = new Image();
          img.onload = () => {
            const canvas = document.createElement('canvas');
            const scale = Math.min(1, 800 / img.width);
            canvas.width = img.width * scale;
            canvas.height = img.height * scale;
            canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
            resolve(canvas.toDataURL('image/jpeg', 0.7));
          };
          img.src = e.target.result;
        };
        reader.readAsDataURL(file);
      });
    }

    function renderPreview() {
      const container = document.getElementById('photoPreview');
      container.innerHTML = photos.map((p, i) => `
        <div class="relative">
          <img src="${p}" class="w-full aspect-square object-cover rounded-2xl">
          <button onclick="removePhoto(${i})" class="absolute top-1 right-1 bg-red-500 text-white text-xs px-2 py-1 rounded">X</button>
        </div>
      `).join('');
    }

    function removePhoto(i) {
      photos.splice(i, 1);
      renderPreview();
    }

    function saveDish() {
      currentDish.dishName = document.getElementById('dishName').value;
      currentDish.recipe = document.getElementById('recipe').value;
      currentDish.comment = document.getElementById('comment').value;
      currentDish.photos = photos;

      if (!currentDish.dishName) {
        alert("요리 이름을 입력해주세요!");
        return;
      }

      const existing = dishes.findIndex(d => d.id === currentDish.id);
      if (existing > -1) dishes[existing] = currentDish;
      else dishes.push(currentDish);

      localStorage.setItem('dishes', JSON.stringify(dishes));
      closeModal();
      renderDishList();
      alert("✅ 저장되었습니다!");
    }

    function editDish(id) {
      currentDish = dishes.find(d => d.id === id);
      photos = currentDish.photos || [];
      document.getElementById('modal').classList.remove('hidden');
      document.getElementById('dishName').value = currentDish.dishName || '';
      document.getElementById('recipe').value = currentDish.recipe || '';
      document.getElementById('comment').value = currentDish.comment || '';
      renderPreview();
    }

    // 시작
    loadDishes();
  </script>
</body>
</html>
